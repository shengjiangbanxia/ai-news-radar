name: Update Industry Events

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC: 22:00 UTC = 06:00 Asia/Shanghai next day.
    - cron: "0 22 * * *"

concurrency:
  group: update-industry-events-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Generate event warnings
        run: python scripts/update_industry_events.py

      - name: Run event tests
        run: python -m pytest -q tests/test_industry_events.py

      - name: Commit event snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/industry-events.json
          if git diff --cached --quiet; then
            echo "No event changes"
            exit 0
          fi
          git commit -m "chore: update industry event calendar"
          for attempt in 1 2 3; do
            git push && exit 0
            git pull --rebase origin "${GITHUB_REF_NAME}"
          done
          git push
